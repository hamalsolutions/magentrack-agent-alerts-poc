AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Magentrack Agent Alerts POC
  Agentic chatbot processing requests using AWS Bedrock and storing in DynamoDB.

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        MESSAGES_TABLE: !Ref MessagesTable
        S3_BUCKET_NAME: !Ref GuidanceBucket
        BEDROCK_MODEL_ID: "anthropic.claude-3-sonnet-20240229-v1:0"

Resources:
  # --------------------------------------------------------------------------
  # DynamoDB Table
  # --------------------------------------------------------------------------
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: message_id
          AttributeType: S
      KeySchema:
        - AttributeName: message_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  # --------------------------------------------------------------------------
  # S3 Bucket
  # --------------------------------------------------------------------------
  GuidanceBucket:
    Type: AWS::S3::Bucket

  # --------------------------------------------------------------------------
  # Step Functions
  # --------------------------------------------------------------------------
  ChatbotStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Definition:
        StartAt: ProcessMessage
        States:
          ProcessMessage:
            Type: Task
            Resource: !GetAtt ProcessMessageFunction.Arn
            Next: GenerateResponse
          GenerateResponse:
            Type: Task
            Resource: !GetAtt GenerateResponseFunction.Arn
            End: True
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref ProcessMessageFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref GenerateResponseFunction

  # --------------------------------------------------------------------------
  # Lambda Functions
  # --------------------------------------------------------------------------

  # 1. Input Handler (API Gateway)
  InputFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.handlers.input_handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Environment:
        Variables:
          MESSAGES_TABLE: !Ref MessagesTable
          MAGENTRACK_BACKEND_URL: "https://api.magentrack.com"
          MAGENTRACK_USER: ""
          MAGENTRACK_PASSWORD: ""
      Events:
        ApiTrigger:
          Type: Api
          Properties:
            Path: /webhook
            Method: post
            Auth:
              ApiKeyRequired: true

  # --------------------------------------------------------------------------
  # API Gateway Authentication
  # --------------------------------------------------------------------------
  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub "${AWS::StackName}-apikey"
      Enabled: true
      StageKeys:
        - RestApiId: !Ref ServerlessRestApi
          StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref ServerlessRestApi
          Stage: Prod
      UsagePlanName: !Sub "${AWS::StackName}-usage-plan"

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  # 2. Stream Trigger (DynamoDB Stream)
  StreamTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.handlers.stream_trigger.lambda_handler
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref ChatbotStateMachine
      Policies:
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt ChatbotStateMachine.Name
      Events:
        StreamTrigger:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt MessagesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 1

  # 3. Process Message (Step Function Step 1)
  ProcessMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.handlers.process_message.lambda_handler

  # 4. Generate Response (Step Function Step 2)
  GenerateResponseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../
      Handler: src.handlers.generate_response.lambda_handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref GuidanceBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
  BucketName:
    Description: "Name of the S3 bucket"
    Value: !Ref GuidanceBucket
  TableName:
    Description: "DynamoDB Table Name"
    Value: !Ref MessagesTable
  ApiKeyId:
    Description: "API Key ID"
    Value: !Ref ApiKey
